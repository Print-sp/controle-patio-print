<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditoria</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root {
    --brand: #5b2333;
    --brand-soft: #f8edf1;
}
body {
    min-height: 100vh;
    background:
        radial-gradient(circle at top left, rgba(91, 35, 51, 0.1), transparent 26%),
        linear-gradient(180deg, #faf7f8 0%, #f2edf0 100%);
}
.page-shell {
    max-width: 1400px;
}
.hero {
    background: linear-gradient(135deg, #3b1320 0%, var(--brand) 52%, #8e3450 100%);
    color: #fff;
    border-radius: 24px;
    padding: 28px;
    box-shadow: 0 24px 48px rgba(59, 19, 32, 0.18);
}
.panel {
    background: rgba(255,255,255,0.95);
    border-radius: 22px;
    border: 1px solid rgba(91, 35, 51, 0.08);
    box-shadow: 0 18px 32px rgba(15, 23, 42, 0.08);
}
.detail-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
}
.detail-chip {
    display: inline-flex;
    align-items: center;
    max-width: 220px;
    padding: 5px 10px;
    border-radius: 999px;
    background: rgba(91, 35, 51, 0.08);
    color: var(--brand);
    font-size: 0.8rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.detail-empty {
    color: #6c757d;
    font-size: 0.9rem;
}
.audit-modal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(15, 23, 42, 0.46);
    z-index: 1050;
}
.audit-modal.is-open {
    display: flex;
}
.audit-modal__dialog {
    width: min(960px, 100%);
    max-height: calc(100vh - 48px);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 26px 52px rgba(15, 23, 42, 0.24);
}
.audit-modal__header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid rgba(15, 23, 42, 0.08);
}
.audit-modal__body {
    padding: 20px 24px 24px;
    overflow: auto;
}
.audit-meta {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 18px;
}
.audit-meta__item {
    padding: 12px 14px;
    border-radius: 14px;
    background: #f8f9fb;
    border: 1px solid rgba(15, 23, 42, 0.06);
}
.audit-meta__label {
    display: block;
    font-size: 0.74rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #6c757d;
    margin-bottom: 4px;
}
.audit-meta__value {
    display: block;
    color: #212529;
    word-break: break-word;
}
.audit-json {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    background: var(--brand-soft);
    border-radius: 18px;
    padding: 16px;
    font-size: 0.88rem;
}
.audit-section {
    margin-top: 18px;
}
.audit-section__title {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--brand);
    margin-bottom: 10px;
}
.audit-fields {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
}
.audit-fields__item {
    padding: 12px 14px;
    border-radius: 14px;
    background: #fcfbfc;
    border: 1px solid rgba(91, 35, 51, 0.08);
}
.audit-raw {
    margin-top: 18px;
    border: 1px solid rgba(91, 35, 51, 0.12);
    border-radius: 18px;
    background: #fff;
    overflow: hidden;
}
.audit-raw summary {
    cursor: pointer;
    list-style: none;
    padding: 14px 16px;
    font-weight: 700;
    color: var(--brand);
    background: rgba(91, 35, 51, 0.04);
}
.audit-raw summary::-webkit-details-marker {
    display: none;
}
.audit-raw[open] summary {
    border-bottom: 1px solid rgba(91, 35, 51, 0.08);
}
@media (max-width: 767.98px) {
    .audit-modal {
        padding: 12px;
    }
    .audit-modal__header,
    .audit-modal__body {
        padding-left: 16px;
        padding-right: 16px;
    }
}
</style>
</head>
<body>
<main class="container py-4 py-lg-5 page-shell">
    <section class="hero mb-4">
        <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 align-items-lg-center">
            <div>
                <h1 class="h2 mb-2">Auditoria</h1>
                <p class="mb-0 opacity-75">Acompanhe os registros recentes de criação, edição, exclusão e mudanças críticas do sistema.</p>
            </div>
            <div class="text-lg-end">
                <div class="fs-5 fw-semibold" id="auditCount">0 eventos</div>
            </div>
        </div>
    </section>

    <div id="alertHost" class="mb-3"></div>

    <section class="panel p-4">
        <div class="row g-3 mb-3">
            <div class="col-12 col-md-4">
                <label class="form-label" for="searchInput">Buscar</label>
                <input class="form-control" id="searchInput" placeholder="Usuário, resumo ou tipo de registro">
            </div>
            <div class="col-6 col-md-3">
                <label class="form-label" for="entityFilter">Tipo de registro</label>
                <select class="form-select" id="entityFilter">
                    <option value="">Todas</option>
                </select>
            </div>
            <div class="col-6 col-md-3">
                <label class="form-label" for="actionFilter">Ação</label>
                <select class="form-select" id="actionFilter">
                    <option value="">Todas</option>
                </select>
            </div>
            <div class="col-12 col-md-2 d-flex align-items-end">
                <button class="btn btn-outline-secondary w-100" id="refreshBtn" type="button">Atualizar</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>Quando</th>
                        <th>Alterado por</th>
                        <th>Tipo de registro</th>
                        <th>Ação</th>
                        <th>Resumo</th>
                        <th>Detalhes</th>
                    </tr>
                </thead>
                <tbody id="auditTableBody">
                    <tr><td colspan="6" class="text-center py-4 text-secondary">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<div class="audit-modal" id="detailsModal" aria-hidden="true">
    <div class="audit-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="detailsModalTitle">
        <div class="audit-modal__header d-flex justify-content-between align-items-start gap-3">
            <div>
                <h2 class="h4 mb-1" id="detailsModalTitle">Detalhes do evento</h2>
                <p class="mb-0 text-secondary" id="detailsModalSubtitle">Consulta completa do registro selecionado.</p>
                <p class="mb-0 mt-1 fw-semibold" id="detailsModalActor"></p>
            </div>
            <button class="btn btn-outline-secondary" id="closeDetailsBtn" type="button" aria-label="Fechar detalhes">Fechar</button>
        </div>
        <div class="audit-modal__body">
            <div class="audit-meta" id="detailsMeta"></div>
            <section class="audit-section">
                <div class="audit-section__title">Campos registrados</div>
                <div class="audit-fields" id="detailsFields"></div>
            </section>
            <details class="audit-raw" id="detailsRaw">
                <summary>JSON técnico</summary>
                <pre class="audit-json" id="detailsJson">Sem detalhes.</pre>
            </details>
        </div>
    </div>
</div>

<script src="/js/auditoria.js"></script>
</body>
</html>
