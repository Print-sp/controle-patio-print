<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Preview da tela de ocorrencias</title>
  <desc id="desc">Mockup da tela Sistema de Ocorrencias com formulario lateral e tabela de registros.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#e9eff5"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#133b63"/>
      <stop offset="55%" stop-color="#225c90"/>
      <stop offset="100%" stop-color="#2f7ab9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1600" height="1120" fill="url(#bg)"/>
  <circle cx="120" cy="100" r="180" fill="#133b63" opacity="0.06"/>
  <circle cx="1490" cy="60" r="170" fill="#2f7ab9" opacity="0.08"/>

  <g transform="translate(110 60)" filter="url(#shadow)">
    <rect x="0" y="0" width="1380" height="150" rx="26" fill="url(#hero)"/>
    <rect x="34" y="26" width="170" height="36" rx="18" fill="#ffffff" opacity="0.18"/>
    <text x="51" y="49" fill="#ffffff" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Node + SQLite/PostgreSQL</text>
    <text x="34" y="92" fill="#ffffff" font-size="42" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Sistema de Ocorrencias</text>
    <text x="34" y="124" fill="#d9ebff" font-size="20" font-family="Segoe UI, Arial, sans-serif">Cadastro, edicao, exclusao e listas auxiliares persistidas no banco.</text>
    <text x="1170" y="78" fill="#ffffff" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="end">0 ocorrencias</text>
    <text x="1170" y="110" fill="#d9ebff" font-size="18" font-family="Segoe UI, Arial, sans-serif" text-anchor="end">URL direta: /ocorrencias</text>
  </g>

  <g transform="translate(110 250)" filter="url(#shadow)">
    <rect x="0" y="0" width="430" height="760" rx="24" fill="#ffffff" opacity="0.95"/>
    <text x="34" y="54" fill="#10233d" font-size="32" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Nova ocorrencia</text>
    <text x="34" y="88" fill="#62748a" font-size="18" font-family="Segoe UI, Arial, sans-serif">Preencha os campos e salve no banco.</text>
    <rect x="320" y="28" width="80" height="34" rx="16" fill="#eef2f6"/>
    <text x="360" y="50" fill="#334155" font-size="16" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Limpar</text>

    <g transform="translate(34 122)" font-family="Segoe UI, Arial, sans-serif">
      <g transform="translate(0 0)">
        <text x="0" y="0" fill="#445468" font-size="16">Numero da Viagem</text>
        <rect x="0" y="14" width="362" height="48" rx="14" fill="#f8fafc" stroke="#d9e2ec"/>
      </g>
      <g transform="translate(0 84)">
        <text x="0" y="0" fill="#445468" font-size="16">Data da Viagem</text>
        <rect x="0" y="14" width="362" height="48" rx="14" fill="#f8fafc" stroke="#d9e2ec"/>
      </g>
      <g transform="translate(0 168)">
        <text x="0" y="0" fill="#445468" font-size="16">Filial</text>
        <rect x="0" y="14" width="362" height="48" rx="14" fill="#f8fafc" stroke="#d9e2ec"/>
      </g>
      <g transform="translate(0 252)">
        <text x="0" y="0" fill="#445468" font-size="16">Tipo da Viagem</text>
        <rect x="0" y="14" width="362" height="48" rx="14" fill="#f8fafc" stroke="#d9e2ec"/>
      </g>
      <g transform="translate(0 336)">
        <text x="0" y="0" fill="#445468" font-size="16">Linha</text>
        <rect x="0" y="14" width="362" height="48" rx="14" fill="#f8fafc" stroke="#d9e2ec"/>
      </g>
      <g transform="translate(0 420)">
        <text x="0" y="0" fill="#445468" font-size="16">Placa</text>
        <rect x="0" y="14" width="362" height="48" rx="14" fill="#f8fafc" stroke="#d9e2ec"/>
      </g>
      <g transform="translate(0 504)">
        <text x="0" y="0" fill="#445468" font-size="16">Tipo do Veiculo</text>
        <rect x="0" y="14" width="362" height="48" rx="14" fill="#f8fafc" stroke="#d9e2ec"/>
      </g>
      <g transform="translate(0 588)">
        <text x="0" y="0" fill="#445468" font-size="16">Motivo / Subcategoria / Detalhamento</text>
        <rect x="0" y="14" width="362" height="48" rx="14" fill="#f8fafc" stroke="#d9e2ec"/>
      </g>
    </g>

    <rect x="34" y="650" width="362" height="86" rx="16" fill="#f8fafc" stroke="#d9e2ec"/>
    <text x="48" y="678" fill="#445468" font-size="16" font-family="Segoe UI, Arial, sans-serif">Observacao</text>
    <rect x="34" y="760" width="240" height="50" rx="16" fill="#1c5ea0"/>
    <text x="154" y="792" fill="#ffffff" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Salvar ocorrencia</text>
    <rect x="286" y="760" width="110" height="50" rx="16" fill="#eef2f6"/>
    <text x="341" y="792" fill="#334155" font-size="17" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Cancelar</text>
  </g>

  <g transform="translate(570 250)" filter="url(#shadow)">
    <rect x="0" y="0" width="920" height="760" rx="24" fill="#ffffff" opacity="0.95"/>
    <text x="34" y="54" fill="#10233d" font-size="32" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Ocorrencias cadastradas</text>
    <text x="34" y="88" fill="#62748a" font-size="18" font-family="Segoe UI, Arial, sans-serif">Os registros sao gravados no mesmo banco do servidor Node.</text>
    <rect x="618" y="26" width="268" height="48" rx="16" fill="#f8fafc" stroke="#d9e2ec"/>
    <text x="640" y="56" fill="#94a3b8" font-size="17" font-family="Segoe UI, Arial, sans-serif">Buscar por viagem, placa, filial...</text>

    <g transform="translate(34 130)" font-family="Segoe UI, Arial, sans-serif">
      <rect x="0" y="0" width="852" height="54" rx="16" fill="#133b63"/>
      <text x="22" y="34" fill="#ffffff" font-size="16" font-weight="700">Viagem</text>
      <text x="102" y="34" fill="#ffffff" font-size="16" font-weight="700">Data</text>
      <text x="182" y="34" fill="#ffffff" font-size="16" font-weight="700">Filial</text>
      <text x="280" y="34" fill="#ffffff" font-size="16" font-weight="700">Tipo</text>
      <text x="364" y="34" fill="#ffffff" font-size="16" font-weight="700">Linha</text>
      <text x="452" y="34" fill="#ffffff" font-size="16" font-weight="700">Placa</text>
      <text x="540" y="34" fill="#ffffff" font-size="16" font-weight="700">Veiculo</text>
      <text x="646" y="34" fill="#ffffff" font-size="16" font-weight="700">Motivo</text>
      <text x="742" y="34" fill="#ffffff" font-size="16" font-weight="700">Acoes</text>

      <g transform="translate(0 70)">
        <rect x="0" y="0" width="852" height="86" rx="18" fill="#f8fbfe" stroke="#e5edf5"/>
        <rect x="18" y="20" width="62" height="30" rx="15" fill="#e8f0f7"/>
        <text x="49" y="40" fill="#133b63" font-size="15" font-weight="700" text-anchor="middle">1024</text>
        <text x="102" y="40" fill="#334155" font-size="15">29/03/2026</text>
        <text x="182" y="40" fill="#334155" font-size="15">Cajamar</text>
        <text x="280" y="40" fill="#334155" font-size="15">Transferencia</text>
        <text x="364" y="40" fill="#334155" font-size="15">Linha Norte</text>
        <text x="452" y="40" fill="#334155" font-size="15">ABC1D23</text>
        <text x="540" y="40" fill="#334155" font-size="15">Cavalo</text>
        <text x="646" y="40" fill="#334155" font-size="15">Avaria</text>
        <rect x="730" y="18" width="50" height="30" rx="14" fill="#eaf2ff"/>
        <text x="755" y="38" fill="#1d4ed8" font-size="14" font-weight="700" text-anchor="middle">Editar</text>
        <rect x="790" y="18" width="52" height="30" rx="14" fill="#fff1f2"/>
        <text x="816" y="38" fill="#dc2626" font-size="14" font-weight="700" text-anchor="middle">Excluir</text>
        <text x="182" y="64" fill="#64748b" font-size="14">Subcategoria, detalhamento, OS e observacao aparecem nas colunas seguintes.</text>
      </g>

      <g transform="translate(0 172)">
        <rect x="0" y="0" width="852" height="86" rx="18" fill="#ffffff" stroke="#e5edf5"/>
        <rect x="18" y="20" width="62" height="30" rx="15" fill="#e8f0f7"/>
        <text x="49" y="40" fill="#133b63" font-size="15" font-weight="700" text-anchor="middle">1023</text>
        <text x="102" y="40" fill="#334155" font-size="15">28/03/2026</text>
        <text x="182" y="40" fill="#334155" font-size="15">Jaragua</text>
        <text x="280" y="40" fill="#334155" font-size="15">Coleta</text>
        <text x="364" y="40" fill="#334155" font-size="15">Linha Sul</text>
        <text x="452" y="40" fill="#334155" font-size="15">DSS1D11</text>
        <text x="540" y="40" fill="#334155" font-size="15">Carreta</text>
        <text x="646" y="40" fill="#334155" font-size="15">Pane</text>
        <rect x="730" y="18" width="50" height="30" rx="14" fill="#eaf2ff"/>
        <text x="755" y="38" fill="#1d4ed8" font-size="14" font-weight="700" text-anchor="middle">Editar</text>
        <rect x="790" y="18" width="52" height="30" rx="14" fill="#fff1f2"/>
        <text x="816" y="38" fill="#dc2626" font-size="14" font-weight="700" text-anchor="middle">Excluir</text>
        <text x="182" y="64" fill="#64748b" font-size="14">Busca por viagem, placa, filial, tipo, linha, motivo e observacao.</text>
      </g>

      <g transform="translate(0 274)">
        <rect x="0" y="0" width="852" height="260" rx="22" fill="#f8fafc" stroke="#e2e8f0" stroke-dasharray="8 8"/>
        <text x="426" y="128" fill="#94a3b8" font-size="24" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Aqui aparecem todas as ocorrencias cadastradas</text>
        <text x="426" y="164" fill="#94a3b8" font-size="18" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">com botoes de editar e excluir em cada linha</text>
      </g>
    </g>
  </g>
</svg>
